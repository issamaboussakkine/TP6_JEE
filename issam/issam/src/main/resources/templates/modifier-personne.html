<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifier une personne</title>
</head>
<body>
<h1>Modifier la personne</h1>

<form action="#" th:action="@{/miseajour/{id}(id=${personne.id})}" th:object="${personne}" method="post">
    <label for="name">Nom :</label>
    <input type="text" th:field="*{name}" id="name">
    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Erreur nom</span>
    <br><br>

    <label for="email">Email :</label>
    <input type="text" th:field="*{email}" id="email">
    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Erreur email</span>
    <br><br>

    <input type="submit" value="Mettre à jour">
</form>

<br>
<a href="/">Retour à l'accueil</a>
</body>
</html>
